# Nebari default Starship configuration.
# Uses ANSI named colors (no hex) so xterm.js maps them through the
# JupyterLab terminal palette — readable in both light and dark themes.
# Users can override by setting STARSHIP_CONFIG in their .bashrc.

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username$directory$git_branch$git_status$python$conda$cmd_duration$line_break$character"""

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold red"
format = '[$user]($style) '

[directory]
truncation_length = 4
truncation_symbol = "…/"
style = "bold blue"
format = '[$path]($style) '

[git_branch]
symbol = ""
style = "bold magenta"
format = '[($symbol)$branch]($style) '

[git_status]
style = "bold yellow"
format = '([\($all_status$ahead_behind\)]($style) )'

[python]
symbol = "py:"
style = "bold yellow"
format = '[$symbol$version]($style) '

[conda]
symbol = "env:"
style = "bold green"
format = '[$symbol$environment]($style) '
ignore_base = false

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = '[took $duration]($style) '

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

# Disable noisy modules
[os]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[docker_context]
disabled = true
[kubernetes]
disabled = true
[package]
disabled = true
[nodejs]
disabled = true

# Nebari default Starship configuration
# Users can override by setting STARSHIP_CONFIG in their .bashrc

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$directory\
$git_branch\
$git_status\
$python\
$conda\
$cmd_duration\
$line_break\
$character"""

[username]
show_always = true
style_user = "bold blue"
style_root = "bold red"
format = '[$user]($style) '

[directory]
truncation_length = 3
truncation_symbol = ".../"
style = "bold cyan"
format = '[ $path]($style) '

[git_branch]
symbol = " "
style = "bold purple"
format = '[$symbol$branch]($style) '

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'

[python]
symbol = " "
style = "bold yellow"
format = '[$symbol$version]($style) '

[conda]
symbol = " "
style = "bold green"
format = '[$symbol$environment]($style) '
ignore_base = false

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = '[took $duration]($style) '

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

# Disable noisy modules
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[docker_context]
disabled = true
[kubernetes]
disabled = true
[package]
disabled = true
[nodejs]
disabled = true

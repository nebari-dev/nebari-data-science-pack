# Nebari default Starship configuration (Catppuccin theme)
# Users can override by setting STARSHIP_CONFIG in their .bashrc

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# Default palette ŌĆö overridden by nebari-terminal.sh based on terminal theme
palette = "catppuccin_mocha"

format = """
$os$username$directory$git_branch$git_status$python$conda$cmd_duration$line_break$character"""

[os]
disabled = false
style = "bold text"
format = '[$symbol ]($style)'

[os.symbols]
Ubuntu = "’īø"
Linux = "’īÜ"
Macos = "’ģ╣"
Debian = "’īå"
Fedora = "’īŖ"
Arch = "’īā"
Alpine = "’īĆ"
Amazon = "’ē░"
CentOS = "’īä"
Redhat = "’ī¢"
Windows = "’ģ║"

[username]
show_always = true
style_user = "bold blue"
style_root = "bold red"
format = '[$user]($style) '

[directory]
truncation_length = 4
truncation_symbol = "ŌĆ”/"
style = "bold lavender"
format = '[’ü╝ $path]($style) '

[git_branch]
symbol = "ŅéĀ"
style = "bold mauve"
format = '[$symbol $branch]($style) '

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'

[python]
symbol = "Ņśå"
style = "bold yellow"
format = '[$symbol $version]($style) '

[conda]
symbol = "’Æć"
style = "bold green"
format = '[$symbol $environment]($style) '
ignore_base = false

[cmd_duration]
min_time = 2000
style = "bold peach"
format = '[took $duration]($style) '

[character]
success_symbol = '[ŌØ»](bold green)'
error_symbol = '[ŌØ»](bold red)'

# Disable noisy modules
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[docker_context]
disabled = true
[kubernetes]
disabled = true
[package]
disabled = true
[nodejs]
disabled = true


[workspace]
name = "default"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
python = "3.10.*"

# system tools (moved from apt-get)
git = "*"
curl = "*"
wget = "*"

jupyterhub = "==5.1.0"
jupyterhub-kubespawner = "==6.2.0"
oauthenticator = "==16.3.0"
escapism = "==1.0.1"
python-kubernetes = "*"
kubernetes_asyncio = "==29.0.0"
jupyterhub-idle-culler = "==1.2.1"
sqlalchemy = "==1.4.46"
# jhub-apps#676 requires pyjwt>=2.10. Pin in conda so transitive deps that
# request <2.10 are forced to upgrade rather than pinning to 2.9.0.
pyjwt = ">=2.10,<3"

[pypi-dependencies]
nebari-jupyterhub-theme = "==2024.7.1"
python-keycloak = "==0.26.1"
# Pinned to nebari-dev/jhub-apps#676 (fall-through-on-non-HS256-Bearer)
# until the fix lands in a tagged release. Required for forwardAccessToken: true
# behind Envoy Gateway.
jhub-apps = { git = "https://github.com/nebari-dev/jhub-apps.git", rev = "a94b049a9bcc72e2844d5cf0cc2978d4badd2cd5" }

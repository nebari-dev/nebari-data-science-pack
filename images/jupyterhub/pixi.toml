[workspace]
name = "default"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
python = "3.10.*"

# system tools (moved from apt-get)
git = "*"
curl = "*"
wget = "*"

jupyterhub = "==5.5.0"
jupyterhub-kubespawner = "==7.0.0"
oauthenticator = "==17.4.0"
escapism = "==1.0.1"
python-kubernetes = "*"
kubernetes_asyncio = "==29.0.0"
jupyterhub-idle-culler = "==2.0.0"
sqlalchemy = "==1.4.46"
# PyJWT 2.13.0 patches 2026 GitHub advisories affecting <=2.12.1.
pyjwt = ">=2.13.0,<3"

[pypi-dependencies]
nebari-jupyterhub-theme = "==2024.7.1"
python-keycloak = "==0.26.1"
# 2026.6.1 keeps the font template vars and removes the old PyJWT cap.
jhub-apps = "==2026.6.1"

[workspace]
name = "default"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]

# general
python = "3.12.*"

# jupyterhub/jupyterlab
ipython = ">7"
jupyter-server-proxy = ">=4.5.0,<5"
jupyter_server = ">=2.20.0,<3"
jupyterlab = "==4.6.1"
jupyter_client = "*"
jupyter_console = "*"
jupyterhub = "==5.5.0"
nbconvert = "*"
notebook = "==7.6.0"
nbval = "*"

# jupyterlab extensions
dask_labextension = ">=7.0.0,<8"
jupyterlab-git = ">=0.54.0"
sidecar = ">=0.8.1,<0.9"
ipywidgets = ">=8.1.8,<9"
ipyleaflet = ">=0.20.0,<0.21"
pyviz_comms = ">=3.0.6,<4"
jupyter-resource-usage = ">=1.2.1,<2"
nbgitpuller = ">=1.3.0,<2"
jupyterlab_code_formatter = ">=3.0.3,<4"
jupyterlab-spellchecker = ">=0.8.4,<0.9"
jupyterlab-pioneer = ">=1.7.3,<2"
jupyter-ai = "==3.0.1"
jupyter-ai-litellm = "==0.0.2"
jupyter-ai-magic-commands = "==0.0.3"
jupyterlab-favorites = ">=3.5.2,<4"
# jupyter-scheduler is disabled until the service is configured
# jupyter-scheduler = ">=2.8.0,<3.0.0"

# viz tools
param = "*"
python-graphviz = "*"
plotly = ">=5.0"
ipympl = ">=0.9.6"
bokeh = ">=3.5.2"

# testing, docs, linting
pytest = "*"
hypothesis = "*"
flake8 = "*"
sphinx = "*"
pytest-cov = "*"
black = "*"
isort = "*"
importnb = "*"
git-lfs = "*"

# system tools (moved from apt-get)
htop = "*"
tree = "*"
zip = "*"
unzip = "*"
openssh = "*"
tmux = "*"
nano = "*"
vim = "*"
zsh = "*"
neovim = "*"
gnupg = "*"

# jhub-apps 2026.6.1 allows modern PyJWT; PyJWT 2.13.0 patches
# 2026 GitHub advisories affecting <=2.12.1.
pyjwt = ">=2.13.0,<3"

[pypi-dependencies]
jupyter-vscode-proxy = { git = "https://github.com/betatim/vscode-binder.git" }
nb_nebi_kernels = "==0.1"
jupyterlab_nvdashboard = "==0.12.0"
# argo-jupyter-scheduler = "==2024.6.1"  # disabled until service is configured
jhub-apps = "==2026.6.1"
jupyterlab-nebari-mode = "==0.3.0"
jupyterlab-launchpad = "==1.0.5"
jupyterlab-gallery = "==0.6.3"
jupyterlab-jhub-apps = "==0.3.1"

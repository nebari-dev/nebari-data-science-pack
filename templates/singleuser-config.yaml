apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nebari-data-science-pack.name" . }}-singleuser-config
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
data:
  jupyter_server_config.py: |
    c.MappingKernelManager.cull_connected = {{ if .Values.singleuserCuller.kernel.cullConnected }}True{{ else }}False{{ end }}
    c.MappingKernelManager.cull_idle_timeout = {{ .Values.singleuserCuller.kernel.cullIdleTimeout }}
    c.MappingKernelManager.cull_interval = {{ .Values.singleuserCuller.kernel.cullInterval }}
    c.MappingKernelManager.cull_busy = {{ if .Values.singleuserCuller.kernel.cullBusy }}True{{ else }}False{{ end }}

    c.TerminalManager.cull_inactive_timeout = {{ .Values.singleuserCuller.terminal.cullInactiveTimeout }}
    c.TerminalManager.cull_interval = {{ .Values.singleuserCuller.terminal.cullInterval }}

    # Disable the built-in shutdown_no_activity_timeout — it is defeated by
    # JupyterLab's WebSocket reconnect cycle which resets the activity clock
    # every ~5 minutes. Our custom monitor (idle_shutdown_ext) replaces it.
    c.ServerApp.shutdown_no_activity_timeout = 0

    # Load the idle shutdown monitor after the server starts.
    # The config file runs during initialize(), before the IOLoop starts.
    # We schedule the monitor setup to run once the IOLoop is running.
    import sys as _sys
    _sys.path.insert(0, "/etc/jupyter")

    def _deferred_start_monitor():
        from jupyter_server.serverapp import ServerApp
        import idle_shutdown_ext
        idle_shutdown_ext.load_jupyter_server_extension(ServerApp.instance())

    from tornado.ioloop import IOLoop as _IOLoop
    _IOLoop.current().call_later(5, _deferred_start_monitor)

  idle_shutdown_ext.py: |
    """Jupyter server extension: shut down when no kernels/terminals and no real HTTP activity.

    Unlike the built-in shutdown_no_activity_timeout, this ignores WebSocket
    reconnect traffic (JupyterLab's ~5 min cycle) and only tracks real HTTP
    requests as user activity. This means:
      - User browsing files with no kernel → server stays alive
      - Idle open tab with only WebSocket reconnects → server shuts down
    """

    import datetime as _dt
    import logging

    from tornado.ioloop import IOLoop, PeriodicCallback
    from tornado.web import RequestHandler
    from tornado.websocket import WebSocketHandler

    log = logging.getLogger(__name__)

    _IDLE_SHUTDOWN_TIMEOUT = {{ .Values.singleuserCuller.server.shutdownNoActivityTimeout }}
    _IDLE_CHECK_INTERVAL = 15  # seconds

    _last_user_activity = _dt.datetime.now(_dt.timezone.utc)
    _shutdown_scheduled = False
    _original_prepare = None


    def _tracking_prepare(self):
        """RequestHandler.prepare override that tracks non-WebSocket requests."""
        global _last_user_activity
        if not isinstance(self, WebSocketHandler):
            _last_user_activity = _dt.datetime.now(_dt.timezone.utc)
        return _original_prepare(self)


    def _jupyter_server_extension_points():
        return [{"module": "idle_shutdown_ext"}]

    def _load_jupyter_server_extension(serverapp):
        load_jupyter_server_extension(serverapp)

    def load_jupyter_server_extension(serverapp):
        """Called by jupyter_server when the extension is loaded."""
        global _original_prepare

        # Patch RequestHandler.prepare to track real HTTP activity
        _original_prepare = RequestHandler.prepare
        RequestHandler.prepare = _tracking_prepare

        def _check():
            global _shutdown_scheduled
            km = serverapp.kernel_manager
            has_kernels = bool(km.list_kernel_ids())

            has_terminals = False
            try:
                tm = serverapp.web_app.settings.get("terminal_manager")
                if tm and tm.list():
                    has_terminals = True
            except Exception:
                pass

            if has_kernels or has_terminals:
                _shutdown_scheduled = False
                return

            # No kernels or terminals — check for recent real HTTP activity
            now = _dt.datetime.now(_dt.timezone.utc)
            idle_secs = (now - _last_user_activity).total_seconds()

            if idle_secs >= _IDLE_SHUTDOWN_TIMEOUT and not _shutdown_scheduled:
                log.warning(
                    "No kernels/terminals and no HTTP activity for %ds. "
                    "Shutting down.", int(idle_secs),
                )
                _shutdown_scheduled = True
                IOLoop.current().call_later(0, serverapp.stop)

        pc = PeriodicCallback(_check, _IDLE_CHECK_INTERVAL * 1000)
        pc.start()
        log.info(
            "Idle shutdown monitor started (timeout=%ds, check=%ds)",
            _IDLE_SHUTDOWN_TIMEOUT,
            _IDLE_CHECK_INTERVAL,
        )

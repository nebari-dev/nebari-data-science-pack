{{- if .Values.sharedStorage.enabled }}
{{- if eq (include "nebari-data-science-pack.nfsServerEnabled" .) "true" }}
# Fake StorageClass used only for PV↔PVC binding — no dynamic provisioner.
# The unique name ensures this PVC only binds to our NFS-backed PV.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ include "nebari-data-science-pack.fullname" . }}-nfs-share
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
  annotations:
    # Never delete this StorageClass during ArgoCD sync — deleting it unbinds the
    # shared-storage PVC and disrupts all user pods until manually recreated.
    argocd.argoproj.io/sync-options: Prune=false
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
---
# PersistentVolume pointing to the in-cluster NFS server.
# The fake StorageClass name ensures this PV only binds to our PVC below.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "nebari-data-science-pack.fullname" . }}-nfs-share
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
  annotations:
    # Never delete this PV during ArgoCD sync — deletion unbinds the PVC and
    # disrupts all user pods. Data on the backing NFS PVC is NOT lost (Retain
    # policy) but the platform is down until the PV is manually recreated.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: {{ .Values.sharedStorage.size }}
  storageClassName: {{ include "nebari-data-science-pack.fullname" . }}-nfs-share
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  {{- with .Values.sharedStorage.nfsServer.mountOptions }}
  # Set sharedStorage.nfsServer.mountOptions=[nfsvers=3] for clusters where
  # the host filesystem is overlayfs (kind, k3d, some containerd setups):
  # the volume-nfs image fails to export `/` on overlayfs but leaves it in
  # the export table with fsid=0, which breaks NFSv4 pseudo-fs traversal.
  # On regular ext4/xfs nodes the default (NFSv4) works fine — leave empty.
  mountOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- /*
      NFS server endpoint. The kubelet performs the NFS mount in the host's
      network namespace, where /etc/resolv.conf typically points at the
      upstream DNS provider (the VPC resolver on managed Kubernetes) — not
      at the cluster's CoreDNS. As a result, mounts that reference the
      Service FQDN fail with "Failed to resolve server ...: Name or service
      not known" on most cloud-managed clusters (EKS, GKE without node-local
      DNS, AKS without DNS forwarders).

      Resolve the Service's ClusterIP at install time via `helm lookup` and
      bake the IP into the PV. kube-proxy programs host-side iptables for
      Service IPs so the mount works without any host-DNS dependency.

      Fall back to the FQDN when the lookup returns no IP — which happens
      on the very first `helm install` (Service doesn't exist yet) and
      during `helm template`-only renders (no live API). The FQDN path
      preserves backward compatibility for clusters whose host DNS DOES
      forward cluster.local to CoreDNS (k3s, microk8s with custom resolvers).

      Note: PV `.spec.persistentvolumesource` is immutable. On a fresh
      install where the FQDN landed first, the next `helm upgrade` will
      see the Service-IP-rendered manifest but the API server will reject
      the patch. Recovery: delete the PV (Retain reclaim policy preserves
      the backing storage on the NFS server's RWO PVC) and re-sync.
  */ -}}
  {{- $svcName := printf "%s-nfs" (include "nebari-data-science-pack.fullname" .) }}
  {{- $svcFQDN := printf "%s.%s.svc.cluster.local" $svcName .Release.Namespace }}
  {{- $svcIP := "" }}
  {{- $svcLookup := (lookup "v1" "Service" .Release.Namespace $svcName) }}
  {{- if $svcLookup }}
  {{-   $svcIP = (default "" $svcLookup.spec.clusterIP) }}
  {{- end }}
  nfs:
    server: {{ default $svcFQDN $svcIP | quote }}
    path: /exports
---
# Shared-storage PVC — bound to the NFS-backed PV above.
# User pods mount this PVC with per-group subPaths (/shared/<group>).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-storage
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ include "nebari-data-science-pack.fullname" . }}-nfs-share
  resources:
    requests:
      storage: {{ .Values.sharedStorage.size }}
{{- else }}
# External RWX StorageClass path — requires the cluster to provide an RWX-capable
# StorageClass (e.g. EFS, NFS provisioner). Set sharedStorage.nfsServer.enabled=true
# to use the built-in NFS server instead.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-storage
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.sharedStorage.accessModes | nindent 4 }}
  {{- if .Values.sharedStorage.storageClass }}
  storageClassName: {{ .Values.sharedStorage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.sharedStorage.size }}
{{- end }}
{{- end }}

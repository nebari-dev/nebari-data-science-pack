apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nebari-data-science-pack.name" . }}-hub-config
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
{{- /*
  Substitute OAuth URL placeholders in 00-gateway-auth.py with the derived
  hub hostname. When no hub hostname is available (neither nebariapp.hostname
  nor keycloak.hostname set), leave the __CHART_*__ placeholders intact so
  the python file falls back to its OAUTH_CALLBACK_URL env-var path (or to
  dummy auth on a plain kind deploy).
*/}}
{{- $hubHost := include "nebari-data-science-pack.hubHostname" . -}}
{{- $gatewayAuthPy := .Files.Get "config/jupyterhub/00-gateway-auth.py" -}}
{{- if $hubHost }}
{{- $gatewayAuthPy = $gatewayAuthPy | replace "__CHART_OAUTH_CALLBACK_URL__" (printf "https://%s/hub/oauth_callback" $hubHost) | replace "__CHART_OAUTH_EXTERNAL_URL__" (printf "https://%s/" $hubHost) -}}
{{- end }}
data:
  # ---------------------------------------------------------------------------
  # 00-chart-derived.py — Helm-rendered defaults for every `custom.*` URL /
  # client-id that the deployer can leave blank. Defines a `get_chart_config`
  # helper used by the rest of the config files. Sorts before all others so
  # the helper is in scope when 01/02/03 load.
  # ---------------------------------------------------------------------------
  00-chart-derived.py: |
    """Chart-rendered defaults + get_chart_config helper.

    Generated by templates/hub-config.yaml at Helm render time. Each value
    here is the chart's default for the matching `jupyterhub.custom.<key>`;
    deployer overrides in values.yaml win because get_chart_config consults
    z2jh's get_config first.
    """
    # ruff: noqa: F821 - exec'd by JupyterHub with shared namespace.

    from z2jh import get_config as _z2jh_get_config

    _MISSING = object()

    _CHART_DERIVED = {
        "external-url": {{ $hubHost | quote }},
        "nebi-image": {{ include "nebari-data-science-pack.nebiImage" . | quote }},
        "nebi-remote-url": {{ include "nebari-data-science-pack.nebiRemoteURL" . | quote }},
        "nebi-internal-url": {{ include "nebari-data-science-pack.nebiInternalURL" . | quote }},
        "keycloak-token-url": {{ include "nebari-data-science-pack.keycloakTokenURL" . | quote }},
        "nebi-client-id": {{ include "nebari-data-science-pack.nebiClientID" . | quote }},
        "jupyterhub-client-id": {{ include "nebari-data-science-pack.hubClientID" . | quote }},
        # Mirrors .Values.sharedStorage.enabled so deployers don't have to set
        # both. Deployer override via jupyterhub.custom.shared-storage-enabled
        # still wins via z2jh.
        "shared-storage-enabled": {{ ternary "True" "False" .Values.sharedStorage.enabled }},
    }


    def get_chart_config(key, default=""):
        """Read `jupyterhub.custom.<key>` with chart-rendered fallback.

        Order of precedence:
          1. Deployer override in `jupyterhub.custom.<key>` — any *non-empty*
             value wins. Empty string is treated as "not set" because the
             chart's values.yaml bakes every override key in as `""`, and
             z2jh sees those bakes as keys-with-empty-values, not as
             missing keys. Distinguishing "deployer typed `''`" from "chart
             default `''`" is not possible at runtime and rare in practice.
          2. Helm-rendered default from this chart (see _CHART_DERIVED above)
          3. `default` argument
        """
        value = _z2jh_get_config(f"custom.{key}", _MISSING)
        if value is not _MISSING and value != "":
            return value
        if key in _CHART_DERIVED:
            return _CHART_DERIVED[key]
        return default
  00-gateway-auth.py: |
{{ $gatewayAuthPy | indent 4 }}
  01-spawner.py: |
{{ .Files.Get "config/jupyterhub/01-spawner.py" | replace "__SINGLEUSER_CONFIG_CM__" (include "nebari-data-science-pack.singleuser-config" .) | replace "__EXTERNAL_AUTH_ENABLED__" (toString .Values.externalAuth.enabled) | replace "__EXTERNAL_AUTH_BROKER_URL__" .Values.externalAuth.brokerURL | replace "__EXTERNAL_AUTH_PROVIDERS_JSON__" (toJson .Values.externalAuth.providers) | replace "__EXTERNAL_AUTH_ENV_VAR_MAP_JSON__" (toJson .Values.externalAuth.envVarMap) | replace "__EXTERNAL_AUTH_TIMEOUT_SECONDS__" (toString .Values.externalAuth.timeoutSeconds) | indent 4 }}
  02-jhub-apps.py: |
{{ .Files.Get "config/jupyterhub/02-jhub-apps.py" | indent 4 }}
  03-nebi-envs.py: |
{{ .Files.Get "config/jupyterhub/03-nebi-envs.py" | indent 4 }}

# Default values for nebari-data-science-pack
# This is a YAML-formatted file.
#
# =============================================================================
# Zero-config deploy
# =============================================================================
# This chart aims to ship sensible defaults so a fresh deploy needs only ONE
# field: keycloak.hostname. Everything else is derived from it by subdomain
# convention; any field can be overridden explicitly.
#
# Minimal values for a fresh deploy:
#   keycloak:
#     hostname: keycloak.example.com    # drives derivation of hub/nebi URLs
#
# Conventions chart relies on (all override-able):
#   * Keycloak is bitnami/keycloakx, namespace `keycloak`, realm `nebari`
#   * Hub is reachable at `hub.<base-domain-of-keycloak.hostname>`
#   * Nebi is reachable at `nebi.<base-domain-of-keycloak.hostname>`
#   * nebari-operator runs in the cluster and provisions the OIDC client
#
# =============================================================================
# Keycloak — only the hostname is required for full zero-config.
# =============================================================================
keycloak:
  # External Keycloak FQDN. Empty is OK if you set nebariapp.hostname and
  # nebi.remoteURL explicitly AND Keycloak is reachable at the in-cluster
  # bitnami service path below.
  hostname: ""
  # Realm name; matches the standard Nebari operator setup.
  realm: nebari
  # In-cluster bitnami/keycloakx service host:port. Used by the hub <-> nebi
  # token-exchange path when keycloak.hostname is empty.
  serviceHost: "keycloak-keycloakx-http.keycloak.svc.cluster.local:8080"

# Subdomain convention used to derive hub/nebi hostnames from
# keycloak.hostname. Override per-deploy if your DNS doesn't follow this.
subdomains:
  hub: hub
  nebi: nebi

# =============================================================================
# Nebari Integration
# =============================================================================
# Creates a NebariApp CRD that configures routing and auth via nebari-operator.
# Set to false when deploying outside of Nebari.
nebariapp:
  enabled: true
  # External JupyterHub FQDN.
  # If empty, derived from keycloak.hostname as `<subdomains.hub>.<base-domain>`.
  # e.g. keycloak.hostname=keycloak.example.com → hub.example.com
  hostname: ""
  service:
    # JupyterHub proxy service (created by jupyterhub subchart)
    name: proxy-public
    port: 80
  # Gateway routing. Defaults to sending all paths to the JupyterHub proxy so
  # the operator creates the HTTPRoute (and, with it, the TLS listener/cert)
  # out of the box. Without this the NebariApp reports RoutingNotConfigured and
  # the hub is never exposed.
  routing:
    routes:
      - pathPrefix: /
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    # Hub does its own OAuth dance (see config/jupyterhub/00-gateway-auth.py),
    # so the callback URL is JupyterHub's standard path, not Envoy's.
    redirectURI: /hub/oauth_callback
    scopes:
      - openid
      - profile
      - email
      - groups
    # enforceAtGateway runs Envoy's OIDC filter for the host. Disabled here:
    # when JupyterHub is its own OAuth client (GenericOAuthenticator with
    # refresh_token grants), Envoy-level OIDC adds nothing and its cookie
    # rotation lag stales out auth_state for /services/japps/* paths.
    # Operator drops the SecurityPolicy on this flip via
    # deleteSecurityPolicyIfExists; the KC client + Secret stay provisioned
    # because provisionClient: true is independent of enforcement.
    enforceAtGateway: false
    # Hub owns the OAuth flow (KeyCloakOAuthenticator) and persists tokens to
    # auth_state. No upstream component needs the Envoy-injected Bearer.
    forwardAccessToken: false
  # landingPage controls whether and how this service appears on the Nebari
  # landing page (requires nebari-operator with LandingPageConfig support).
  landingPage:
    # enabled: when true the service card is shown on the Nebari landing page.
    enabled: true
    # displayName: human-readable label shown on the service card (max 64 chars).
    displayName: "JupyterHub"
    # description: supplementary text shown on the service card (max 256 chars).
    description: "Interactive Python notebooks for data science"
    # icon: built-in icon ID (e.g. jupyter, grafana) or a URL to a custom image.
    # Using a local SVG with prefers-color-scheme support instead of the upstream
    # jupyter.org logo which has dark gray elements invisible in dark mode.
    icon: "https://raw.githubusercontent.com/nebari-dev/nebari-data-science-pack/main/assets/icons/jupyter-icon-light.svg"
    iconLight: "https://raw.githubusercontent.com/nebari-dev/nebari-data-science-pack/main/assets/icons/jupyter-icon-light.svg"
    iconDark: "https://raw.githubusercontent.com/nebari-dev/nebari-data-science-pack/main/assets/icons/jupyter-icon-dark.svg"
    # category: groups related services together on the landing page.
    category: "Data Science"
    # priority: sort order within a category; lower numbers appear first (0–1000).
    priority: 1
    # externalUrl: overrides the URL derived from spec.hostname shown on the card.
    # externalUrl: ""
    # healthCheck: HTTP health probe used by the landing page to mark the service
    # reachable/unreachable. path defaults to /health; interval 10–300 s; timeout 1–30 s.
    healthCheck:
      enabled: true
      path: "/hub/api/health"  # JupyterHub health endpoint
      intervalSeconds: 30
      timeoutSeconds: 5

# =============================================================================
# =============================================================================
# Singleuser top-level chart options
# =============================================================================
# Network access toggles for singleuser pods that the jupyterhub subchart's
# own NetworkPolicy doesn't cover. Each rule below is rendered as its own
# NetworkPolicy and unioned with the subchart's policy (Kubernetes
# NetworkPolicy semantics).
singleuser:
  networkPolicy:
    # Lets singleuser pods reach the Nebari gateway pod (Envoy Gateway proxy)
    # in its own namespace. Required on Hetzner k3s + any cluster where
    # kube-proxy DNATs the LoadBalancer VIP to the proxy pod IP BEFORE the
    # subchart's pod-level NetworkPolicy is evaluated — without this, pods
    # cannot resolve `https://<hub>/services/japps` or `https://<nebi-host>`
    # via the cluster's external IP. Harmless on clusters that don't need it
    # (extra NetworkPolicy is unioned, never blocks). Default true.
    allowEgressToGateway: true
    # Override these only if the operator's gateway is not at the standard
    # location (envoy-gateway-system / nebari-gateway / port 10443).
    gatewayNamespace: envoy-gateway-system
    gatewayName: nebari-gateway
    gatewayPort: 10443

# =============================================================================
# Singleuser Idle Culler
# =============================================================================
# Configures idle culling inside each user pod. This is separate from the
# hub-level jupyterhub-idle-culler (configured under jupyterhub.cull) and
# enables culling even when browser tabs are left open.
# Matches the defaults from classic nebari.
singleuserCuller:
  kernel:
    cullConnected: true      # Cull kernels even with open browser connections
    cullIdleTimeout: 900     # 15 min — seconds before an idle kernel is culled
    cullInterval: 300        # 5 min — how often to check for idle kernels (seconds)
    cullBusy: false          # Don't cull kernels that are running code
  terminal:
    cullInactiveTimeout: 900 # 15 min — seconds before an idle terminal is culled
    cullInterval: 300        # 5 min — how often to check for idle terminals (seconds)
  server:
    shutdownNoActivityTimeout: 900  # 15 min — seconds after last kernel/terminal gone before server self-terminates

# Shared storage — per-group directories mounted at /shared/<group> in user pods.
# Requires an RWX StorageClass on the cluster.
#
# In NIC-managed clusters that StorageClass is `longhorn`, installed by NIC's
# storage layer (hetzner, aws, existing providers). Set
# `sharedStorage.storageClass: longhorn` and leave `nfsServer.enabled=false`.
#
# `nfsServer.enabled=true` deploys an in-cluster NFS server pod
# (quay.io/nebari/volume-nfs) that re-exports a RWO PVC as RWX. It exists as
# a transitional fallback for environments where NIC has not yet wired up an
# RWX class (e.g. local dev, GCP, Azure). The image is a manifest-schema
# repack of an abandoned upstream — tracked for removal in issue #29.
sharedStorage:
  enabled: true
  # StorageClass for the shared PVC when nfsServer.enabled=false.
  # Leave empty to use the cluster default (must support ReadWriteMany).
  storageClass: ""
  size: 10Gi
  accessModes:
    - ReadWriteMany
  # Allowlist of group names to mount as shared directories.
  # If empty, all groups from the user's Keycloak token are mounted.
  groups: []
  # Mount path prefix for shared group directories inside user pods.
  mountPathPrefix: /shared
  # Transitional in-cluster NFS server. Prefer an external RWX StorageClass
  # (see RECOMMENDED list above). Tracked for removal in issue #29.
  # Default ON so the chart self-bootstraps RWX on any cluster with a default
  # RWO StorageClass. Set false (and provide sharedStorage.storageClass) on
  # clusters with a native RWX class (longhorn, EFS, Filestore).
  nfsServer:
    enabled: true
    # StorageClass for the NFS server's backend RWO PVC.
    # Leave empty to use the cluster default.
    storageClass: ""
    # NOTE: 0.8-repack is a manifest-schema repack of the abandoned
    # gcr.io/google-containers/nfs-server:0.8 image (see
    # nebari-dev/nebari-docker-images#230). We carry it for clusters that
    # cannot provide RWX storage natively; on NIC-managed clusters set
    # `sharedStorage.storageClass: longhorn` and leave nfsServer disabled.
    image:
      repository: quay.io/nebari/volume-nfs
      tag: "0.8-repack"
    # Deploy a DaemonSet that installs nfs-common on every node.
    # Required on k3s/minimal OS nodes that ship without NFS client tools.
    installClient: false
    # Pin the NFS server pod to specific nodes to avoid slow RWO PVC reattachment
    # when the pod reschedules (detach + reattach can take 30-120s on some providers).
    # Example for Hetzner worker nodes:
    #   nodeSelector:
    #     node.kubernetes.io/instance-type: cpx31
    nodeSelector: {}
    # Advanced: full nodeAffinity spec (overrides nodeSelector if both set)
    nodeAffinity: {}
    # NFS PV mountOptions. Default (empty) lets kubelet negotiate NFSv4.
    # Set to ["nfsvers=3"] when running on overlayfs nodes (kind, k3d,
    # some containerd setups) where the volume-nfs image's NFSv4 export
    # of `/` is broken — see shared-pvc.yaml for details.
    mountOptions: []

# =============================================================================
# Nebi Integration
# =============================================================================
# Companion service (nebari-nebi-pack) deployed in its own namespace.
nebi:
  # Nebi binary image. An init container copies the nebi binary from this image
  # into each JupyterLab pod, so the version is controlled at deploy time
  # rather than baked into the JupyterLab image.
  image:
    repository: quay.io/nebari/nebi
    # Pinned per chart release by CI (scripts/bump_image_tags.py); deployers
    # can override to test a PR build or roll forward. Leave non-empty so
    # the init container is wired by default.
    tag: "sha-be3187c"
    pullPolicy: IfNotPresent
  # External Nebi FQDN (browser-side, used for OIDC redirect).
  # If empty, derived from keycloak.hostname as
  # `https://<subdomains.nebi>.<base-domain>`.
  remoteURL: ""
  # In-cluster URL used by the hub for the token-exchange path.
  # If empty, derived as
  # `http://nebi-pack-nebari-nebi-pack.<nebi.namespace>.svc.cluster.local`.
  internalURL: ""
  # Namespace where nebi-pack is deployed. Used both for the network policy
  # and to derive internalURL above.
  namespace: "nebi"
  # Helm release name used by nebi-pack. Drives the derived OIDC client ID
  # `nebi-<releaseName>-nebari-nebi-pack` (operator naming convention).
  releaseName: "nebi-pack"
  # Port the Nebi server listens on (used in hub -> nebi NetworkPolicy
  # egress rule).
  port: 8460

# Helm Job that one-shots Keycloak realm config for role-gated shared
# mounts. Runs as a post-install / post-upgrade
# hook. Idempotent; skips cleanly if ``kcAdminCredentialSecret`` is
# unset, so the chart can install on clusters that haven't yet
# surfaced an admin credential.
#
# The Job:
#   1. Adds the ``oidc-group-membership-mapper`` to the ``groups``
#      client scope (the missing-mapper bug that surfaces as an empty
#      groups claim on tokens).
#   2. Creates the ``allow-group-directory-creation-role`` client
#      role on the hub OIDC client with attributes
#      ``component=shared-directory`` and
#      ``scopes=write:shared-mount``.
#   3. Grants the hub client ``serviceAccountsEnabled=true`` and
#      binds ``realm-management.{view-clients,view-groups,view-realm}``
#      to its service account.
#   4. Assigns the shared-mount role to the KC groups in
#      ``sharedMountGroups``.
#
# Runtime config the hub itself reads (admin API URL + role name)
# goes under ``jupyterhub.custom.rbac-*`` — see below.
rbac:
  bootstrap:
    # On by default — every Nebari deployment uses bitnami/keycloakx +
    # nebari-operator NebariApps, so the chart can self-bootstrap the
    # KC role + group mapper that the spawner needs. Set ``false`` for
    # non-Nebari (local-dev, kind, BYO-Keycloak) deployments.
    enabled: true
    # Namespace the Job runs in. Defaults to ``keycloak`` so the Job
    # can read the admin-credentials Secret without cross-namespace
    # copy. Override for non-bitnami KC layouts.
    namespace: "keycloak"
    # Name of a K8s Secret holding the KC realm-admin password in key
    # ``password``. Job authenticates as ``admin`` in the ``master``
    # realm via kcadm.sh and applies config to ``realmName``. Defaults
    # to bitnami/keycloakx's secret name; override for other layouts.
    kcAdminCredentialSecret: "keycloak-admin-credentials"
    # Key within ``kcAdminCredentialSecret`` that holds the password.
    # Default ``admin-password`` matches the bitnami keycloak/keycloakx
    # chart's ``keycloak-admin-credentials`` Secret layout.
    kcAdminCredentialSecretKey: "admin-password"
    # Realm to bootstrap.
    realmName: "nebari"
    # ClientId of the hub OAuth client in Keycloak (created by the
    # nebari-operator NebariApp). Leave empty to derive from the
    # release + chart name (the operator's standard pattern:
    # ``jupyterhub-<release>-<chart>``). Override for non-standard
    # client ids.
    hubClientId: ""
    # Name of the client role the Job creates on the hub OIDC client.
    # Must match ``KC_SHARED_MOUNT_ROLE`` env var on the hub Deployment
    # (defaults align).
    sharedMountRoleName: "allow-group-directory-creation-role"
    # KC group paths to assign the shared-mount role to. Each path
    # must already exist in KC. e.g.
    #   - /admin
    #   - /developer
    sharedMountGroups: []
    # External hub URL (origin) used to set ``rootUrl`` / ``baseUrl`` /
    # ``initiate.login.uri`` on the hub OIDC client. Without these,
    # KC-initiated SSO flows (account console, third-party launchers)
    # redirect straight to ``/hub/oauth_callback`` without first hitting
    # ``/hub/oauth_login``, so JupyterHub has no ``oauthenticator-state``
    # cookie set and returns ``400 OAuth state mismatch``.
    # Leave empty to default to ``https://{nebariapp.hostname}``; set to
    # an explicit URL for non-standard layouts. Set to "false" string or
    # remove via Helm override to skip the patch entirely.
    hubExternalUrl: ""
    # Keycloak server URL the bootstrap script talks to (Admin REST API
    # lives at ``<kcHost>/admin/realms/...``). In-cluster service URL by
    # default; override if Keycloak sits at a different hostname.
    kcHost: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local:8080"
    # Image that runs ``files/keycloak_rbac_bootstrap.py``. The script
    # uses only the standard library, so any small Python image works.
    image: "python:3.12-slim"

# JupyterHub configuration
# All values under this key are passed to the jupyterhub subchart.
jupyterhub:
  # custom is read by Python config files in jupyterhub_config.d/ via the
  # `get_chart_config("<key>")` helper that ships in 00-chart-derived.py.
  # Every URL / client-id below is OPTIONAL — leave empty and the chart will
  # derive it from the top-level keycloak/nebariapp/nebi values. Explicit
  # values always win.
  custom:
    # JupyterHub bind URL hostname. If empty, derived from nebariapp.hostname
    # (which itself defaults from keycloak.hostname + subdomains.hub).
    external-url: ""
    # Nebi binary image (repository:tag) copied into singleuser pods.
    # If empty, derived as `<nebi.image.repository>:<nebi.image.tag>`.
    nebi-image: ""
    nebi-image-pull-policy: "IfNotPresent"
    # jhub-app-proxy version installed at app-spawn time. Must be >= v0.2.3 for
    # apps to run inside a Nebi (pixi) environment; older versions only support
    # conda activation and fall back to the base env (missing packages).
    jhub-app-proxy-version: "v0.2.3"
    # External Nebi URL. If empty, derived from nebi.remoteURL (which
    # itself defaults from keycloak.hostname + subdomains.nebi).
    nebi-remote-url: ""
    # In-cluster Nebi URL. If empty, derived from nebi.internalURL (which
    # defaults to the standard in-cluster service for nebi-pack).
    nebi-internal-url: ""
    # Keycloak token endpoint used by the hub <-> nebi token exchange.
    # If empty, derived from keycloak.hostname (https) or
    # keycloak.serviceHost (in-cluster http), with keycloak.realm.
    keycloak-token-url: ""
    # OIDC client IDs (provisioned by nebari-operator's AuthReconciler).
    # If empty, derived from operator naming convention:
    #   jupyterhub-<release>-<chart>   (this chart)
    #   nebi-<nebi.releaseName>-nebari-nebi-pack
    nebi-client-id: ""
    jupyterhub-client-id: ""
    # ---------------------------------------------------------------------------
    # Enterprise CA bundle (TLS-inspected egress).
    # When the cluster sits behind a TLS-inspecting proxy, NIC core's
    # trust-manager projects the org CA into every namespace as a ConfigMap.
    # Enabling this merges that CA with the image's system bundle (via an init
    # container) and sets REQUESTS_CA_BUNDLE / SSL_CERT_FILE / NODE_EXTRA_CA_CERTS
    # / CURL_CA_BUNDLE / GIT_SSL_CAINFO on singleuser + app pods, so pip/conda/git
    # work with no --trusted-host / ssl_verify flags.
    # Leave false on clusters without trust-manager (default; no behavior change).
    # The ConfigMap is always mounted optional, so a missing CA never blocks spawn.
    trust-bundle-enabled: false
    # ConfigMap (in the JupyterHub namespace) holding the org CA. Defaults match
    # trust-manager's Bundle convention (Bundle name -> ConfigMap name; the data
    # key set on the Bundle target).
    trust-bundle-configmap: "nebari-trust-bundle"
    trust-bundle-key: "ca-certificates.crt"
    # ---------------------------------------------------------------------------
    # Profiles — resource sizing for JupyterLab pods.
    # Each entry maps directly to a KubeSpawner profile_list item. Slugs are
    # derived from display_name via z2jh's slugify (e.g. "Small Instance" →
    # "small-instance"). Set to [] to disable the profile selector
    # (single-instance mode).
    # kubespawner_override accepts any valid KubeSpawner trait (cpu_limit,
    # mem_limit, node_selector, image, extra_resource_limits, etc.) so deployers
    # can add GPU profiles, custom images, etc. without code changes.
    #
    # Per-profile group gating (parity with classic Nebari). Each entry may
    # declare an ``access`` mode that controls who sees it in the selector:
    #   access: all       (or omitted) profile is visible to every user.
    #   access: yaml      profile is visible only to users whose Keycloak
    #                     groups intersect ``groups``, or whose
    #                     preferred_username is in ``users``. A user in none of
    #                     these never sees it.
    #   access: keycloak  profile is visible only when its ``slug`` is in the
    #                     allow-list granted by the user's ``jupyterlab-profiles``
    #                     Keycloak role. The deployer creates that client role on
    #                     the hub client, puts the allowed slugs in its
    #                     ``profiles`` attribute (and ``component=jupyterhub-profiles``),
    #                     and assigns the role to users or groups. The hub reads
    #                     it via the KC Admin API at login, so the allow-list
    #                     lives in Keycloak rather than in this file.
    # Any other access value fails closed (the profile is hidden) so a typo
    # cannot expose an expensive GPU/large-instance profile to everyone.
    # The ``access``/``groups``/``users`` keys are gating-only and are stripped
    # before the profile reaches KubeSpawner. Groups come from the same
    # Keycloak group claim used by shared storage. Example:
    #   - display_name: "G4 GPU Instance"
    #     access: yaml
    #     groups:
    #       - gpu-access
    #     kubespawner_override:
    #       extra_resource_limits:
    #         nvidia.com/gpu: 1
    # NOTE: when bumping singleuser.image.tag below, also bump the
    # ``image: ...`` lines inside each profile_options.image.choices.default
    # entry so the profile selector shows the right tag. (z2jh values.yaml
    # cannot reference other values, so the duplication is unavoidable.)
    profiles:
      - slug: small-instance
        display_name: "Small Instance"
        description: "1 CPU / 2 GB RAM — interactive notebooks, light data exploration, teaching."
        default: true
        kubespawner_override:
          # Outer image is what jhub-apps' Create App reads for its image
          # TextField (server-types.tsx: `type.kubespawner_override.image`).
          # The same value sits inside profile_options.image.choices.default
          # so the JupyterLab profile selector keeps showing it too.
          # scripts/bump_image_tags.py syncs all three on every bump.
          image: quay.io/nebari/nebari-data-science-pack-jupyterlab:sha-46289ab
          cpu_limit: 1
          cpu_guarantee: 0.5
          mem_limit: "2G"
          mem_guarantee: "1G"
        profile_options:
          image:
            display_name: Image
            choices:
              default:
                display_name: "nebari-data-science-pack-jupyterlab:sha-46289ab"
                default: true
                kubespawner_override:
                  image: quay.io/nebari/nebari-data-science-pack-jupyterlab:sha-46289ab
      - slug: medium-instance
        display_name: "Medium Instance"
        description: "4 CPU / 8 GB RAM — pandas / scikit-learn workloads on medium datasets."
        kubespawner_override:
          image: quay.io/nebari/nebari-data-science-pack-jupyterlab:sha-46289ab
          cpu_limit: 4
          cpu_guarantee: 2
          mem_limit: "8G"
          mem_guarantee: "4G"
        profile_options:
          image:
            display_name: Image
            choices:
              default:
                display_name: "nebari-data-science-pack-jupyterlab:sha-46289ab"
                default: true
                kubespawner_override:
                  image: quay.io/nebari/nebari-data-science-pack-jupyterlab:sha-46289ab
    # Terminal customization: controls Starship prompt in JupyterLab terminals.
    # When false, falls back to the default bash prompt.
    terminal-customization: true
    # Shared storage. shared-storage-enabled auto-mirrors the top-level
    # sharedStorage.enabled (rendered by the chart into 00-chart-derived.py)
    # so deployers no longer need to set it. Override here only to force a
    # specific value independent of the PVC/StorageClass setup.
    shared-storage-groups: []       # allowlist; empty = all groups from token
    shared-storage-mount-prefix: "/shared"
    # Workspace storage — per-user RWO PVC for nebi workspaces.
    # KubeSpawner creates these dynamically in the pre_spawn_hook.
    # Leave empty to use the cluster default StorageClass.
    workspace-storage-class: ""
    # Pixi environments run 2–5 Gi each, so size accordingly.
    workspace-storage-capacity: "20Gi"
    # Role-gated shared-mount RBAC configuration
    # is delivered via the hub Deployment's env vars (KC_REALM_API_URL
    # + KC_SHARED_MOUNT_ROLE), NOT via this `custom` block. Reasons:
    #   * `custom.*` is rendered into the z2jh Secret's embedded
    #     values.yaml. Several rotating fields in that Secret are
    #     pinned via Argo `ignoreDifferences` to stop the
    #     auth_token/cookie_secret churn — and broad ignore on
    #     ``/data`` silently swallows config changes here.
    #   * The hub Deployment's env vars flow through SSA + the
    #     existing checksum-driven hub rollout cleanly.
    #
    # Set in the deployer's overlay under
    # ``jupyterhub.hub.extraEnv.KC_REALM_API_URL``. Empty = RBAC off,
    # spawner falls back to mounting every group the user is in
    # (legacy behaviour). KC requirements (serviceAccountsEnabled,
    # realm-management roles, the shared-directory role with attrs)
    # are provisioned by the chart's ``rbac.bootstrap`` Helm Job.
    # jhub-apps (JAppsConfig) overrides.
    # Any key here is set as an attribute on c.JAppsConfig before install_jhub_apps().
    # See https://jhub-apps.nebari.dev/docs/configuration for available options.
    japps-config:
      hub_host: "hub"
      # 1 uvicorn worker — 4 workers take ~12s to bind, beyond hub's
      # hardcoded 10s wait_for_http_server timeout for managed services
      # → CrashLoopBackOff. 1 worker boots in ~3s and handles small UI load
      # fine for most deployments. Bump if you have many concurrent users.
      service_workers: 1
      # app_title: "JHub Apps Launcher"
      # app_icon: ""
      # conda_envs: []
      # allowed_frameworks: []
      # blocked_frameworks: []
      # additional_services: []  # Chart auto-injects a Nebi card when
      #                          # nebi.remoteURL is set/derivable. Override
      #                          # here to add more or replace the default.
      # startup_apps: []
  hub:
    # Custom Nebari hub image with jhub-apps pre-installed.
    # Tag below is the PR-53 merge-commit SHA at the moment of pinning; the
    # corresponding immutable digest is
    # sha256:7f895be95dd6077f06be35f7ca80cbfe91fa67f4daf27c095b91a2c9c215950f
    # (GenericOAuthenticator + openid scope + starlette<1 + auto_login=True
    # + KeyCloakLogoutHandler captures id_token in get() before base
    # class clears current_user — id_token_hint now reaches KC).
    image:
      name: quay.io/nebari/nebari-data-science-pack-jupyterhub
      tag: "sha-46289ab"

    config:
      JupyterHub:
        admin_access: true
        # Default authenticator for local development - any username/password works
        # For production, use GenericOAuthenticator with Keycloak (see below)
        authenticator_class: dummy

      # ============================================================
      # Optional: Keycloak/OAuth Configuration
      # ============================================================
      # To enable OAuth authentication with Keycloak or another IdP,
      # uncomment and configure the following section:
      #
      # JupyterHub:
      #   authenticator_class: generic-oauth
      #
      # GenericOAuthenticator:
      #   client_id: jupyterhub
      #   client_secret: <your-client-secret>
      #   oauth_callback_url: https://<your-domain>/hub/oauth_callback
      #   authorize_url: https://<keycloak-host>/realms/<realm>/protocol/openid-connect/auth
      #   token_url: https://<keycloak-host>/realms/<realm>/protocol/openid-connect/token
      #   userdata_url: https://<keycloak-host>/realms/<realm>/protocol/openid-connect/userinfo
      #   login_service: "Keycloak"
      #   username_claim: "preferred_username"
      #   scope:
      #     - openid
      #     - profile
      #     - email
      # ============================================================

    # Mount custom config files from ConfigMap + the operator-provisioned
    # Keycloak OIDC client Secret. 00-gateway-auth.py reads client-id /
    # client-secret / issuer-url from /etc/oauth/ when KC OAuth is wired.
    #
    # IMPORTANT: z2jh treats ``extraVolumes`` and ``extraVolumeMounts`` as
    # lists that REPLACE (not merge) on override. If a deployer sets either
    # of these, they MUST re-include the entries below or the hub falls
    # back to dummy auth and/or jupyterhub_config.d is empty.
    #
    # The oauth-client secretName follows the operator's convention:
    # ``{Release.Name}-{Chart.Name}-oidc-client``. Override here if you
    # use a non-standard release name.
    extraVolumes:
      - name: custom-config
        configMap:
          name: nebari-data-science-pack-hub-config
      - name: oauth-client
        secret:
          secretName: data-science-pack-nebari-data-science-pack-oidc-client
          optional: true

    extraVolumeMounts:
      - name: custom-config
        mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/
      - name: oauth-client
        mountPath: /etc/oauth
        readOnly: true

    # KC OIDC client secret. ``02-jhub-apps.py`` and ``03-nebi-envs.py``
    # read this env var to do KC token exchange for the Nebi service.
    # ``00-gateway-auth.py`` reads the same secret from /etc/oauth (file)
    # for the KeyCloakOAuthenticator wiring — both paths point at the
    # same operator-provisioned Secret.
    # The secretName follows the same convention as oauth-client above.
    extraEnv:
      JUPYTERHUB_OIDC_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: data-science-pack-nebari-data-science-pack-oidc-client
            key: client-secret
            optional: true

    service:
      extraPorts:
        - port: 10202
          targetPort: 10202
          name: jhub-apps

    networkPolicy:
      enabled: true
      ingress:
        - ports:
            - port: 10202  # jhub-apps service port

  singleuser:
    image:
      name: quay.io/nebari/nebari-data-science-pack-jupyterlab
      tag: "sha-46289ab"
    defaultUrl: "/lab"
    extraEnv:
      JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"

    # Storage: type "none" required because jhub-apps' JHubSpawner expects volumes
    # as a list, but the subchart's dynamic storage generates a dict.
    # Home directory PVC is configured in 01-spawner.py instead.
    storage:
      type: none

    # networkPolicy:
    #   egress: []  # Override in deployment-specific values (e.g., data-science-pack.yaml)

  proxy:
    service:
      type: ClusterIP
    chp:
      networkPolicy:
        egress:
          - ports:
              - port: 10202
                protocol: TCP

  scheduling:
    userScheduler:
      enabled: false

  cull:
    enabled: true
    timeout: 1800     # 30 min — matches classic nebari
    every: 600        # 10 min — polling interval

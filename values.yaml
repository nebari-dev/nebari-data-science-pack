# Default values for nebari-data-science-pack
# This is a YAML-formatted file.

# =============================================================================
# Nebari Integration
# =============================================================================
# Creates a NebariApp CRD that configures routing and auth via nebari-operator.
# Set to false when deploying outside of Nebari.
nebariapp:
  enabled: true
  # hostname: jupyter.nic.local  # Required when enabled
  service:
    # JupyterHub proxy service (created by jupyterhub subchart)
    name: proxy-public
    port: 80
  # routing:
  #   routes:
  #     - pathPrefix: /
  #       pathType: Exact
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    redirectURI: /oauth2/callback  # Envoy Gateway's default OIDC callback
    scopes:
      - openid
      - profile
      - email
      - groups
  # landingPage controls whether and how this service appears on the Nebari
  # landing page (requires nebari-operator with LandingPageConfig support).
  landingPage:
    # enabled: when true the service card is shown on the Nebari landing page.
    enabled: false
    # displayName: human-readable label shown on the service card (max 64 chars).
    displayName: "JupyterHub"
    # description: supplementary text shown on the service card (max 256 chars).
    description: "Interactive Python notebooks for data science"
    # icon: built-in icon ID (e.g. jupyter, grafana) or a URL to a custom image.
    icon: "https://jupyter.org/assets/homepage/main-logo.svg"
    # category: groups related services together on the landing page.
    category: "Data Science"
    # priority: sort order within a category; lower numbers appear first (0–1000).
    priority: 1
    # externalUrl: overrides the URL derived from spec.hostname shown on the card.
    # externalUrl: ""
    # healthCheck: HTTP health probe used by the landing page to mark the service
    # reachable/unreachable. path defaults to /health; interval 10–300 s; timeout 1–30 s.
    healthCheck:
      enabled: true
      path: "/hub/api/health"  # JupyterHub health endpoint
      intervalSeconds: 30
      timeoutSeconds: 5

# Shared storage configuration (disabled - requires RWX storage class)
sharedStorage:
  enabled: false
  storageClass: ""  # Leave empty to use cluster default
  size: 10Gi
  accessModes:
    - ReadWriteMany

# =============================================================================
# Nebi Integration
# =============================================================================
# When the nebi-pack is deployed alongside data-science-pack, set remoteURL
# so that JupyterLab pods auto-connect to the Nebi team server.
nebi:
  # Nebi binary image. An init container copies the nebi binary from this image
  # into each JupyterLab pod, so the version is controlled at deploy time rather
  # than baked into the jupyterlab image.
  image:
    repository: quay.io/nebari/nebi
    tag: ""  # Required: e.g., sha-a2c937a or pr-199
    pullPolicy: IfNotPresent
  # URL of the remote Nebi server (e.g., https://nebi.nebari.example.com)
  # When set, the Nebi local instance in each JupyterLab pod will auto-connect
  # to this server using the user's Keycloak IdToken cookie.
  remoteURL: ""
  # Cluster-internal URL for Hub -> Nebi token exchange at spawn time.
  # Example: http://nebi-pack-nebari-nebi-pack.nebi.svc.cluster.local
  internalURL: ""
  # Namespace where nebi-pack is deployed (enables hub -> nebi network policy).
  namespace: ""
  # Port the Nebi server listens on (used in hub -> nebi NetworkPolicy egress rule).
  port: 8460

# JupyterHub configuration
# All values under this key are passed to the jupyterhub subchart
jupyterhub:
  # custom is read by z2jh's get_config("custom.<key>") in hub config files.
  # external-url is used by 02-jhub-apps.py to set JupyterHub.bind_url so that
  # internal OAuth redirects use the real hostname instead of 0.0.0.0.
  custom:
    external-url: ""
    nebi-image: ""         # Deployer must set to repository:tag (e.g., quay.io/nebari/nebi:sha-abc)
    nebi-image-pull-policy: "IfNotPresent"  # Pull policy for nebi init container
    nebi-remote-url: ""    # Deployer must set to match .Values.nebi.remoteURL
    nebi-internal-url: ""  # Deployer must set to match .Values.nebi.internalURL
    # Keycloak token exchange config (for Nebi auto-auth at spawn time).
    # The hub client secret is read from JUPYTERHUB_OIDC_CLIENT_SECRET env var
    # (mounted from K8s secret via hub.extraEnv) to avoid plaintext in values.
    keycloak-token-url: ""   # e.g., http://keycloak-keycloakx-http.keycloak.svc.cluster.local:8080/realms/nebari/protocol/openid-connect/token
    nebi-client-id: ""       # Nebi's Keycloak OIDC client ID
    jupyterhub-client-id: "" # JupyterHub's Keycloak OIDC client ID
    # Terminal customization: controls Starship prompt in JupyterLab terminals.
    # When false, falls back to the default bash prompt.
    terminal-customization: true
    # jhub-apps (JAppsConfig) overrides.
    # Any key here is set as an attribute on c.JAppsConfig before install_jhub_apps().
    # See https://jhub-apps.nebari.dev/docs/configuration for available options.
    japps-config:
      hub_host: "hub"
      service_workers: 4
      # app_title: "JHub Apps Launcher"
      # app_icon: ""
      # conda_envs: []
      # allowed_frameworks: []
      # blocked_frameworks: []
      # additional_services: []
      # startup_apps: []
  hub:
    # Custom Nebari hub image with jhub-apps pre-installed
    image:
      name: quay.io/nebari/nebari-data-science-pack-jupyterhub
      tag: "sha-443d1fe"

    config:
      JupyterHub:
        admin_access: true
        # Default authenticator for local development - any username/password works
        # For production, use GenericOAuthenticator with Keycloak (see below)
        authenticator_class: dummy

      # ============================================================
      # Optional: Keycloak/OAuth Configuration
      # ============================================================
      # To enable OAuth authentication with Keycloak or another IdP,
      # uncomment and configure the following section:
      #
      # JupyterHub:
      #   authenticator_class: generic-oauth
      #
      # GenericOAuthenticator:
      #   client_id: jupyterhub
      #   client_secret: <your-client-secret>
      #   oauth_callback_url: https://<your-domain>/hub/oauth_callback
      #   authorize_url: https://<keycloak-host>/realms/<realm>/protocol/openid-connect/auth
      #   token_url: https://<keycloak-host>/realms/<realm>/protocol/openid-connect/token
      #   userdata_url: https://<keycloak-host>/realms/<realm>/protocol/openid-connect/userinfo
      #   login_service: "Keycloak"
      #   username_claim: "preferred_username"
      #   scope:
      #     - openid
      #     - profile
      #     - email
      # ============================================================

    # Mount custom config files from ConfigMap
    extraVolumes:
      - name: custom-config
        configMap:
          name: nebari-data-science-pack-hub-config

    extraVolumeMounts:
      - name: custom-config
        mountPath: /usr/local/etc/jupyterhub/jupyterhub_config.d/

    service:
      extraPorts:
        - port: 10202
          targetPort: 10202
          name: jhub-apps

    networkPolicy:
      enabled: true
      ingress:
        - ports:
            - port: 10202  # jhub-apps service port

  singleuser:
    image:
      name: quay.io/nebari/nebari-data-science-pack-jupyterlab
      tag: "sha-443d1fe"
    defaultUrl: "/lab"
    extraEnv:
      JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"

    # Storage: type "none" required because jhub-apps' JHubSpawner expects volumes
    # as a list, but the subchart's dynamic storage generates a dict.
    # Home directory PVC is configured in 01-spawner.py instead.
    storage:
      type: none

    # networkPolicy:
    #   egress: []  # Override in deployment-specific values (e.g., data-science-pack.yaml)

  proxy:
    service:
      type: ClusterIP
    chp:
      networkPolicy:
        egress:
          - ports:
              - port: 10202
                protocol: TCP

  scheduling:
    userScheduler:
      enabled: false

  cull:
    enabled: true
    timeout: 3600
    every: 300

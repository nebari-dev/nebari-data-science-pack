name: Test Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run e2e tests
        env:
          K3D_KEEP: "1"  # runner is ephemeral, skip teardown
          PYTHONUNBUFFERED: "1"  # stream logs live (no block buffering on non-TTY)
        run: uvx pytest tests/e2e -v --color=yes

      - name: Hub logs on failure
        if: failure()
        run: kubectl logs -l component=hub --tail=200 || true

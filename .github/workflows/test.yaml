name: Test Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install kind
        run: |
          curl -fsSLo /tmp/kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      # Cache the kindest/node image as a docker tarball. Pulling it from
      # the registry was the largest variable cost in CI (saw 9s → 130s
      # depending on runner network), so caching makes runtimes
      # deterministic. Cache key includes the kind version (which fixes
      # the node-image tag).
      - name: Cache kindest/node image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /tmp/kind-images/kindest-node.tar
          key: kindest-node-kind-v0.27.0

      - name: Load cached kindest/node (if present)
        run: |
          mkdir -p /tmp/kind-images
          if [ -f /tmp/kind-images/kindest-node.tar ]; then
            docker load -i /tmp/kind-images/kindest-node.tar
          fi

      - name: Run e2e tests
        env:
          KIND_KEEP: "1"  # runner is ephemeral, skip teardown
          PYTHONUNBUFFERED: "1"  # stream logs live (no block buffering on non-TTY)
        run: uvx pytest tests/e2e -v --color=yes

      # Save kindest/node tarball after first run so subsequent runs hit
      # the cache. Skipped on cache hit to avoid useless rewrites.
      - name: Save kindest/node for cache
        if: success()
        run: |
          if [ ! -f /tmp/kind-images/kindest-node.tar ]; then
            img=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep '^kindest/node:' | head -1)
            [ -n "$img" ] && docker save "$img" -o /tmp/kind-images/kindest-node.tar
          fi

      - name: Hub logs on failure
        if: failure()
        run: kubectl logs -l component=hub --tail=200 || true

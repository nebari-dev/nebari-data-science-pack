baseURL = "https://nebari-dev.github.io/nebari-data-science-pack/docs/"
languageCode = "en-us"
title = "Data Science Pack"

[module]
  [[module.imports]]
    path = "github.com/aktech/darby"

[params]
  accent = "#0f766e"
  accentDark = "#2dd4bf"
  repo = "https://github.com/nebari-dev/nebari-data-science-pack"
  editURL = "https://github.com/nebari-dev/nebari-data-science-pack/edit/main/site/content/"
  showLastUpdated = true
  logo = "/nebari-symbol.svg"
  favicon = "/nebari-symbol.svg"

  [[params.tabs]]
    name = "Docs"
    url = "/docs/"
  [[params.tabs]]
    name = "Reference"
    url = "/reference/"

  [params.search]
    enable = true
    backend = "fuse"

  # Ask Assistant: client-side docs Q&A. Runs the model fully in the browser
  # (no server, no API key). The index is built by the theme's build-index
  # script and shipped as a static file.
  [params.assistant]
    enable = true
    backend = "browser"
    indexPath = "assistant-index.json"
    suggestions = [
      "How do I install the chart?",
      "How do I enable shared storage?",
      "How do I configure Keycloak authentication?",
    ]

  [params.footer]
    text = "Apache 2.0 licensed. Built by Nebari."

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Hugo does not merge a theme's [markup] config into a consuming site
# (the markup key is _merge: none), so this block must live here.
[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
